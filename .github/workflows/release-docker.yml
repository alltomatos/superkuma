name: Release Docker Image

# Builds the self-contained Dockerfile (repo root) and pushes it to Docker Hub.
# Runs on a version tag push (e.g. v2.4.0) or a manual dispatch.
#
# Requires two repository secrets:
#   DOCKERHUB_USERNAME - the Docker Hub account/namespace (e.g. ronaldodavi)
#   DOCKERHUB_TOKEN    - a Docker Hub access token with write scope
#
# amd64-only for now (see ADR-0012): this job runs on a self-hosted runner whose
# Docker daemon is a nested dind sidecar, and QEMU/binfmt registration for arm64
# emulation does not propagate into that nested daemon the way it does on a
# plain host -- so cross-arch (arm64) builds hang waiting for an unsupported
# platform. gnr-kvm's hardware is amd64, so amd64-only builds natively without
# needing emulation at all. Re-add arm64 if/when that's solved (or by building
# it on a real arm64 runner instead of QEMU emulation).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (e.g. 2.4.0)"
        required: true

permissions: {}

env:
  IMAGE: ronaldodavi/superkuma

jobs:
  release-docker:
    if: github.repository == 'alltomatos/superkuma'
    # Self-hosted runner (isolated Docker container + dind sidecar on gnr-kvm,
    # see docs/self-hosted-runner.md). Only THIS maintainer/tag-triggered
    # workflow is routed here -- PR-triggered workflows (Auto Test, etc.) stay
    # on GitHub-hosted runners so untrusted contributor code never executes on
    # our infrastructure.
    runs-on: [self-hosted, gnr-docker]
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with: { persist-credentials: false }

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=${VERSION%%.*}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.6.1

      - name: Login to Docker Hub
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (amd64)
        env:
          VERSION: ${{ steps.version.outputs.version }}
          MAJOR: ${{ steps.version.outputs.major }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --file Dockerfile \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:${MAJOR}" \
            --tag "${IMAGE}:latest" \
            --push \
            .
