services:
  superkuma:
    image: ronaldodavi/superkuma:2
    # To build the image locally instead of pulling it, comment out `image:`
    # above and uncomment the next line:
    # build: .
    container_name: superkuma
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      # Auto-configures the database on first boot -- the in-app setup wizard's
      # database step is skipped entirely, straight to admin account creation.
      SUPERKUMA_DB_TYPE: mariadb
      SUPERKUMA_DB_HOSTNAME: mariadb
      SUPERKUMA_DB_PORT: 3306
      SUPERKUMA_DB_NAME: superkuma
      SUPERKUMA_DB_USERNAME: superkuma
      SUPERKUMA_DB_PASSWORD: ${SUPERKUMA_DB_PASSWORD:?set SUPERKUMA_DB_PASSWORD in a .env file next to this compose.yaml}
    volumes:
      - ./data:/app/data
    ports:
      # <Host Port>:<Container Port>
      - "3001:3001"

  mariadb:
    image: mariadb:11
    container_name: superkuma-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: superkuma
      MARIADB_USER: superkuma
      MARIADB_PASSWORD: ${SUPERKUMA_DB_PASSWORD:?set SUPERKUMA_DB_PASSWORD in a .env file next to this compose.yaml}
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - ./mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Optional metrics sink for the `influxdb` monitor type -- NOT SuperKuma's own
  # database (that's mariadb above). Point Telegraf agents (e.g. the pfSense
  # Telegraf package) at this InfluxDB, then create an `influxdb`-type monitor
  # in SuperKuma pointing at the same place. InfluxDB v1 (InfluxQL API) is
  # required here, not v2/v3 -- see .claude/skills/superkuma-monitoring/references/pfsense-telegraf.md.
  # Auto-creates the "telegraf" database + an admin user on first boot.
  influxdb:
    image: influxdb:1.8
    container_name: superkuma-influxdb
    restart: unless-stopped
    environment:
      INFLUXDB_DB: telegraf
      INFLUXDB_HTTP_AUTH_ENABLED: "true"
      INFLUXDB_ADMIN_USER: superkuma
      INFLUXDB_ADMIN_PASSWORD: ${SUPERKUMA_INFLUXDB_PASSWORD:?set SUPERKUMA_INFLUXDB_PASSWORD in a .env file next to this compose.yaml}
    volumes:
      - ./influxdb-data:/var/lib/influxdb
    ports:
      # Published (not just internal) because Telegraf agents typically run on
      # OTHER hosts (e.g. a pfSense firewall), not inside this Compose network.
      - "8086:8086"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Optional log store for the `loki` monitor type -- NOT SuperKuma's own
  # database (that's mariadb above), and NOT something SuperKuma itself writes
  # raw log lines into (see ADR-0019: SuperKuma only ever queries aggregated
  # LogQL counts, never stores or full-text-searches log content). Point a
  # log-shipping agent (Promtail, Grafana Alloy, Fluentbit, or an OTel
  # Collector -- your choice, SuperKuma does not ship one) at this Loki's push
  # API (http://<host>:3100/loki/api/v1/push), then create a `loki`-type
  # monitor in SuperKuma with log rules pointing at the same place. See
  # .claude/skills/superkuma-monitoring/references/loki-log-monitoring.md.
  # Single-binary mode with local filesystem storage -- fine for a
  # self-hosted instance's log volume, not meant to scale to S3-backed
  # production Loki clusters.
  loki:
    image: grafana/loki:3.3.2
    container_name: superkuma-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-data:/loki
    ports:
      # Published (not just internal) because log-shipping agents typically
      # run on OTHER hosts (e.g. app servers, pfSense), not inside this
      # Compose network.
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
