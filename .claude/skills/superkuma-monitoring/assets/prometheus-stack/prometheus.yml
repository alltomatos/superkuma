# Prometheus scrape config for the example stack in docker-compose.yml.
# Add one job per exporter type; replace targets with your real host:port addresses.

global:
  scrape_interval: 30s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # node_exporter — one Linux host per line (default port 9100)
  - job_name: "node"
    static_configs:
      - targets:
          - "node-exporter:9100" # the containerized one from docker-compose.yml
          # - "linux-host-1:9100"
          # - "linux-host-2:9100"

  # windows_exporter — one Windows host per line (default port 9182)
  - job_name: "windows"
    static_configs:
      - targets:
          # - "win-host-1:9182"
          # - "win-host-2:9182"

  # SQL Server exporter (awaragi/prometheus-mssql-exporter, default port 4000)
  - job_name: "mssql"
    static_configs:
      - targets:
          # - "sql-host-1:4000"
